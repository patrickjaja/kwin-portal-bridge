name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release (e.g. v0.2.3)'
        required: true

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: build (${{ matrix.arch_label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            arch_label: x86_64-linux
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            arch_label: aarch64-linux
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libpipewire-0.3-dev

      - name: Build release binary
        run: cargo build --release --locked

      - name: Stage archive
        env:
          ARCH_LABEL: ${{ matrix.arch_label }}
        run: |
          ARCHIVE="kwin-portal-bridge-${RELEASE_TAG}-${ARCH_LABEL}.tar.gz"
          mkdir -p staged
          cp target/release/kwin-portal-bridge staged/kwin-portal-bridge
          tar -C staged -czf "$ARCHIVE" kwin-portal-bridge
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "archive=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: kwin-portal-bridge-${{ matrix.arch_label }}
          path: |
            ${{ env.archive }}
            ${{ env.archive }}.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Combined checksum manifest
        run: |
          cd dist
          cat *.tar.gz.sha256 > SHA256SUMS
          rm -f *.tar.gz.sha256
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          fail_on_unmatched_files: true
          draft: true
          generate_release_notes: true
